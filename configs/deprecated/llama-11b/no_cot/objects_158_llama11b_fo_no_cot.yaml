# Benchmark - Objects (158, Llama-3.2-11B-Vision-Instruct, FULLY_OBSERVABLE, no CoT)
# Run: python benchmark_runner.py --config configs/full/llama-11b/no_cot/objects_158_llama11b_fo_no_cot.yaml

models:
  seeker:
    model: "Llama-3.2-11B-Vision-Instruct" #HF_PATH=meta-llama/Llama-3.2-11B-Vision-Instruct
    timeout: 120.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_llama11b_fo_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
