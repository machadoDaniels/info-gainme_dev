# Benchmark - diseases (160, microsoft/Phi-4-reasoning-plus, FULLY_OBSERVABLE, CoT)
# Run: python benchmark_runner.py --config configs/deprecated/phi4-reasoning-plus/cot/diseases_160_phi4_reasoning_plus_fo_cot.yaml
# DEPRECATED/BACKLOG: this is Phi-4-reasoning-plus — RL-tuned variant of Phi-4-reasoning.
# Useful only for ablation isolating the effect of the final RL stage. Not in active rotation.

models:
  seeker:
    model: "Phi-4-reasoning-plus" #HF_PATH=microsoft/Phi-4-reasoning-plus
    timeout: 180.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_phi4_reasoning_plus_fo_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
