# Model server endpoints
# Update this file when IPs or ports change — do NOT edit individual configs for this.
#
# Format:
#   <served-model-name>: "<base_url>"

# H100-02: 10.100.0.112
# H100-03: 10.100.0.113
# B200-1: 10.100.0.121

servers:
  # --- Ablation pruner/oracle + standalone seeker models ---
  # Update IPs/ports before running jobs
  Nemotron-Mini-4B-Instruct: "http://CHANGE_ME/v1"      # nvidia/Nemotron-Mini-4B-Instruct (instruct only, no thinking)
  Nemotron-Cascade-8B: "http://CHANGE_ME/v1"            # nvidia/Nemotron-Cascade-8B (instruct; /no_think disables reasoning)
  Nemotron-Cascade-8B-Thinking: "http://CHANGE_ME/v1"   # nvidia/Nemotron-Cascade-8B-Thinking (always thinks)
  Gemma-3-12B-IT: "http://CHANGE_ME/v1"                 # google/gemma-3-12b-it (no thinking support — Gemma 3)

  # --- Judge model for oracle/pruner evaluation (scripts/judge_eval/) ---
  # The real endpoint is written to .servers_override_<JOBID>.yaml by
  # dgx/run_judge_eval.sh when the SLURM job boots its own vLLM.
  gpt-oss-120b: "http://CHANGE_ME/v1"                   # openai/gpt-oss-120b (Harmony reasoning)

  Qwen/Qwen3-235B-A22B-Instruct-2507-FP8: "http://10.100.0.111:8026/v1"
  meta-llama/Llama-3.3-70B-Instruct: "http://10.100.0.111:8030/v1"
  meta-llama/Llama-3.2-11B-Vision-Instruct: "http://CHANGE_ME/v1"   # meta-llama/Llama-3.2-11B-Vision-Instruct
  meta-llama/Llama-3.2-3B-Instruct: "http://CHANGE_ME/v1"           # meta-llama/Llama-3.2-3B-Instruct
  meta-llama/Llama-3.2-1B-Instruct: "http://CHANGE_ME/v1"           # meta-llama/Llama-3.2-1B-Instruct

  Qwen3-8B: "http://10.100.0.113:9200/v1"
  Qwen3-30B-A3B-Thinking-2507: "http://10.100.0.121:8029/v1"
  # Qwen3-30B-A3B-Instruct-2507: "http://10.100.0.113:8022/v1"
  Qwen3-4B-Thinking-2507: "http://10.100.0.112:8021/v1"
  Qwen3-4B-Instruct-2507: "http://10.100.0.113:8026/v1"
  Qwen3-0.6B: "http://10.100.0.113:8025/v1"
