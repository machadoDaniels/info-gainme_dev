# Benchmark Configuration - Diseases Dataset (773 diseases)
# Run: python benchmark_runner.py --config configs/diseases_full_cot_remote.yaml
# Preprocess first: python scripts/prepare_diseases_csv.py

models:
  seeker:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0
    extra_body:
      chat_template_kwargs: 
        enable_thinking: true


  oracle:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0


  pruner:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_full_po_cot"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
