# Benchmark Configuration - Objects Test (34 objects, FO + no COT)
# Run: python benchmark_runner.py --config configs/objects_test_fo_no_cot.yaml

models:
  seeker:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "objects"
  csv_path: "data/objects/objects_test.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_test_fo_no_cot"
  max_workers: 12

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
