# Benchmark - Objects (158, ftajwar/paprika_Meta-Llama-3.1-8B-Instruct, PARTIALLY_OBSERVABLE, no CoT)
# Run: python benchmark_runner.py --config configs/full/paprika-llama-3.1-8b/no_cot/objects_158_paprika_llama31_8b_po_no_cot.yaml

models:
  seeker:
    model: "paprika_Meta-Llama-3.1-8B-Instruct" #HF_PATH=ftajwar/paprika_Meta-Llama-3.1-8B-Instruct
    timeout: 120.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_paprika_llama31_8b_po_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
