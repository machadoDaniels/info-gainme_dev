# Benchmark - Geo (160, ftajwar/paprika_Meta-Llama-3.1-8B-Instruct, PARTIALLY_OBSERVABLE, no CoT)
# Run: python benchmark_runner.py --config configs/full/paprika-llama-3.1-8b/no_cot/geo_160_paprika_llama31_8b_po_no_cot.yaml

models:
  seeker:
    model: "paprika_Meta-Llama-3.1-8B-Instruct" #HF_PATH=ftajwar/paprika_Meta-Llama-3.1-8B-Instruct
    timeout: 120.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "geo_160_paprika_llama31_8b_po_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
