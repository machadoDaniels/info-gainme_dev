# Ablation study: pruner/oracle = Nemotron-Cascade-8B
# Seeker: Qwen3-8B  [CoT]
# Dataset: diseases, Observability: FULLY_OBSERVABLE
# Run: python benchmark_runner.py --config configs/full/ablation_pruner_oracle/nemotron_8b/diseases_160_8b_fo_cot.yaml

models:
  seeker:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Nemotron-Cascade-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Nemotron-Cascade-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_8b_fo_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
