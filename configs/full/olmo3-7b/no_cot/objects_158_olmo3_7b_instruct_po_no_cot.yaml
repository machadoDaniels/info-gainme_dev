# Benchmark Configuration - Objects (objects_158, Olmo-3-7B-Instruct, PO + No COT)

models:
  seeker:
    model: "Olmo-3-7B-Instruct"
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_olmo3_7b_instruct_po_no_cot"
  max_workers: 24
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
