# Benchmark Configuration - Geo (geo_160, Olmo-3-7B-Instruct, FO + No COT)

models:
  seeker:
    model: "Olmo-3-7B-Instruct"
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "geo_160_olmo3_7b_instruct_fo_no_cot"
  max_workers: 24
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
