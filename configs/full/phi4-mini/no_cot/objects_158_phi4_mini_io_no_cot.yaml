# Benchmark - Objects (158, microsoft/Phi-4-mini-instruct, INITIALLY_OBSERVABLE, no CoT)
# Run: python benchmark_runner.py --config configs/full/phi4-mini/no_cot/objects_158_phi4_mini_io_no_cot.yaml

models:
  seeker:
    model: "Phi-4-mini-instruct" #HF_PATH=microsoft/Phi-4-mini-instruct
    timeout: 120.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "INITIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_phi4_mini_io_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
