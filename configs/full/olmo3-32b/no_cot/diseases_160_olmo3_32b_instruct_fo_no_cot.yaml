# Benchmark Configuration - Diseases (diseases_160, Olmo-3.1-32B-Instruct, FO + No COT)

models:
  seeker:
    model: "Olmo-3.1-32B-Instruct"
    timeout: 240.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_160.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "diseases_160_olmo3_32b_instruct_fo_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
