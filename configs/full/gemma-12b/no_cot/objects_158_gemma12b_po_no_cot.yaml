# Benchmark - Objects (158, Gemma-3-12B-IT seeker, PARTIALLY_OBSERVABLE, no CoT)
# HF: google/gemma-3-12b-it  (Gemma 3 — no thinking support)
# Run: python benchmark_runner.py --config configs/full/gemma-12b/no_cot/objects_158_gemma12b_po_no_cot.yaml

models:
  seeker:
    model: "Gemma-3-12B-IT" #HF_PATH=google/gemma-3-12b-it
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_gemma12b_po_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
