# Benchmark - Objects (158, google/gemma-3-4b-it, INITIALLY_OBSERVABLE, no CoT)
# Run: python benchmark_runner.py --config configs/full/gemma-3-4b/objects_158_gemma3_4b_io_no_cot.yaml

models:
  seeker:
    model: "Gemma-3-4B-IT" #HF_PATH=google/gemma-3-4b-it
    timeout: 120.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "INITIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_158.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_gemma3_4b_io_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
