# Benchmark Configuration - Objects Full (158 items, 235B, IO, no CoT)
# Run: python benchmark_runner.py --config configs/full/235b/no_cot/objects_158_235b_io_no_cot.yaml

models:
  seeker:
    model: "Qwen/Qwen3-235B-A22B-Instruct-2507-FP8" #HF_PATH=Qwen/Qwen3-235B-A22B-Instruct-2507-FP8
    timeout: 180.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "INITIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_235b_io_no_cot"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
