# Benchmark - Diseases (160, Gemma-4-E4B seeker, FULLY_OBSERVABLE, no CoT)
# HF: google/gemma-4-E4B  (Gemma 4 — enable_thinking: false disables reasoning)
# Run: python benchmark_runner.py --config configs/full/gemma4-e4b/no_cot/diseases_160_gemma4e4b_fo_no_cot.yaml

models:
  seeker:
    model: "Gemma-4-E4B" #HF_PATH=google/gemma-4-E4B
    timeout: 180.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_gemma4e4b_fo_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
