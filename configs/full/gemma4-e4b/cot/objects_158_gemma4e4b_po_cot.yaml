# Benchmark - Objects (158, Gemma-4-E4B seeker, PARTIALLY_OBSERVABLE, CoT)
# HF: google/gemma-4-E4B  (Gemma 4 — configurable thinking)
# Run: python benchmark_runner.py --config configs/full/gemma4-e4b/cot/objects_158_gemma4e4b_po_cot.yaml

models:
  seeker:
    model: "Gemma-4-E4B" #HF_PATH=google/gemma-4-E4B
    timeout: 300.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_gemma4e4b_po_cot_with_kickoff"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
