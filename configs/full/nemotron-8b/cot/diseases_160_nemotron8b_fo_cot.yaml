# Benchmark - Diseases (160, Nemotron-Cascade-8B-Thinking seeker, FULLY_OBSERVABLE, CoT)
# HF: nvidia/Nemotron-Cascade-8B-Thinking  (always thinks — no enable_thinking flag needed)
# Run: python benchmark_runner.py --config configs/full/nemotron-8b/cot/diseases_160_nemotron8b_fo_cot.yaml

models:
  seeker:
    model: "Nemotron-Cascade-8B-Thinking" #HF_PATH=nvidia/Nemotron-Cascade-8B-Thinking
    timeout: 300.0
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_nemotron8b_fo_cot"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
