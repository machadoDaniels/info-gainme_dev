# Benchmark - Diseases (160, Nemotron-Cascade-8B seeker, PARTIALLY_OBSERVABLE, CoT)
# HF: nvidia/Nemotron-Cascade-8B  (dual-mode: enable_thinking: true for CoT)
# Run: python benchmark_runner.py --config configs/full/nemotron-8b/cot/diseases_160_nemotron8b_po_cot.yaml

models:
  seeker:
    model: "Nemotron-Cascade-8B" #HF_PATH=nvidia/Nemotron-Cascade-8B
    timeout: 300.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_nemotron8b_po_cot_with_kickoff"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
