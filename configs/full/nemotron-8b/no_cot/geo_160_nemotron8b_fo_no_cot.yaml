# Benchmark Configuration - Geo Full (160 cities, Nemotron-Cascade-8B seeker, FO, no CoT)
# Run: python benchmark_runner.py --config configs/full/nemotron-8b/no_cot/geo_160_nemotron8b_fo_no_cot.yaml
# NOTE: endpoint configured in configs/servers.yaml under "Nemotron-Cascade-8B"

models:
  seeker:
    model: "Nemotron-Cascade-8B" #HF_PATH=nvidia/Nemotron-Cascade-8B
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "geo_160_nemotron8b_fo_no_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
