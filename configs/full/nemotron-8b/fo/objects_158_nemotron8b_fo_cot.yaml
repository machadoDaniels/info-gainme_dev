# Benchmark - Objects (158, Nemotron-Cascade-8B seeker, FULLY_OBSERVABLE, CoT)
# HF: nvidia/Nemotron-Cascade-8B  (dual-mode: enable_thinking: true for CoT)
# Run: python benchmark_runner.py --config configs/full/nemotron-8b/cot/objects_158_nemotron8b_fo_cot.yaml

models:
  seeker:
    model: "Nemotron-Cascade-8B" #HF_PATH=nvidia/Nemotron-Cascade-8B
    timeout: 300.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_nemotron8b_fo_cot_with_kickoff"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
