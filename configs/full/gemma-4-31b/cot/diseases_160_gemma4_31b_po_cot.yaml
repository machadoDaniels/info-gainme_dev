# Benchmark - Diseases (160, google/gemma-4-31B-it, PARTIALLY_OBSERVABLE, CoT)
# Run: python benchmark_runner.py --config configs/full/gemma-4-31b/cot/diseases_160_gemma4_31b_po_cot.yaml

models:
  seeker:
    model: "google/gemma-4-31B-it"
    api_key: "vllm_ceia_100"
    timeout: 180.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/top_160_diseases.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_gemma4_31b_po_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
