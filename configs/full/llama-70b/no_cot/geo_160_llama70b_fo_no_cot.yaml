# Benchmark Configuration - Geo Full (160 cities, Llama-3.3-70B, FO, no CoT)
# Run: python benchmark_runner.py --config configs/full/llama-70b/no_cot/geo_160_llama70b_fo_no_cot.yaml

models:
  seeker:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "geo_160_llama70b_fo_no_cot"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
