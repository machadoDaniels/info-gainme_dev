# Benchmark Configuration - Objects Full (158 items, Llama-3.3-70B, PO, no CoT)
# Run: python benchmark_runner.py --config configs/full/llama-70b/no_cot/objects_158_llama70b_po_no_cot.yaml

models:
  seeker:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "objects_158_llama70b_po_no_cot"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
