# Benchmark Configuration - Diseases Full (160 items, Llama-3.3-70B, PO, no CoT)
# Run: python benchmark_runner.py --config configs/full/llama-70b/no_cot/diseases_160_llama70b_po_no_cot.yaml

models:
  seeker:
    model: "Llama-3.3-70B-Instruct" #HF_PATH=meta-llama/Llama-3.3-70B-Instruct
    timeout: 180.0

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_llama70b_po_no_cot"
  max_workers: 8
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
