# Benchmark Configuration - Geo Full (160 cities, FO + COT)
# Run: python benchmark_runner.py --config configs/full/4b/geo_fo_cot.yaml

models:
  seeker:
    model: "Qwen3-4B-Thinking-2507"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "geo_160_4b_thinking_fo_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
