# Benchmark Configuration - Diseases Full (160 diseases, FO + COT)
# Run: python benchmark_runner.py --config configs/full/4b/diseases_fo_cot.yaml

models:
  seeker:
    model: "Qwen3-4B-Thinking-2507"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_160.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_160_4b_thinking_fo_cot"
  max_workers: 16
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
