# Benchmark Configuration - Objects Full (158 objects, 8B, PO + NO_COT)
# Run: python benchmark_runner.py --config configs/full/4b/objects_158_po_no_cot.yaml

models:
  seeker:
    model: "Qwen3-4B-Instruct-2507"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: false

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "objects_158_4b_instruct_po_no_cot"
  max_workers: 32
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
