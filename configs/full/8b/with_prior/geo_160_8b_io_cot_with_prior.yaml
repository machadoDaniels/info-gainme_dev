# Benchmark Configuration - Geo Full (160 cities, IO + COT) — WITH POPULATION PRIOR
# Ablation: seeker system prompt is augmented with pool construction info
#   (160 most populous cities by population rank) so the model can adjust its prior.
# Compare against: geo_160_8b_io_cot.yaml (baseline, no prior)
# Run: python benchmark_runner.py --config configs/full/8b/geo_160_8b_io_cot_with_prior.yaml

models:
  seeker:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true

game:
  observability_mode: "INITIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "geo"
  csv_path: "data/geo/top_160_pop_cities.csv"
  num_targets: null
  runs_per_target: 1
  pool_description: >
    The candidate pool consists of the 160 most populous cities in the world,
    selected strictly by population rank.

experiment:
  name: "geo_160_8b_io_cot_with_prior"
  max_workers: 32
  tags:
    prior: "population_rank"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
