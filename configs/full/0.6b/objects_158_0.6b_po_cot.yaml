# Benchmark Configuration - Objects Full (158 objects, 0.6B, PO + COT)
# Run: python benchmark_runner.py --config configs/full/0.6b/objects_158_0.6b_po_cot.yaml

models:
  seeker:
    model: "Qwen3-0.6B"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_158_0.6b_po_cot"
  max_workers: 32
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
