# Benchmark Configuration - Geo Dataset (top 40 cities)
# Run: python benchmark_runner.py --config configs/geo_full_cot.yaml
models:
  seeker:
    model: "Qwen3-30B-A3B-Instruct-2507"
    base_url: "http://localhost:8002/v1"
    timeout: 120.0
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    use_reasoning: true

  oracle:
    model: "Qwen3-8B"
    base_url: "http://localhost:8000/v1"
    timeout: 120.0

  pruner:
    model: "Qwen3-8B"
    base_url: "http://localhost:8000/v1"
    timeout: 120.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 30

dataset:
  csv_path: "data/geo/top_40_pop_cities.csv"
  num_targets: null
  runs_per_target: 3

experiment:
  name: "top40_po_cot"
  max_workers: 12
  tags: {}

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: true

debug:
  enabled: true
