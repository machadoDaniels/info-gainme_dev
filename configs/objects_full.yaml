# Benchmark Configuration - Flat Objects Dataset (all 158 objects)
# Run: python benchmark_runner.py --config configs/objects_full.yaml

models:
  seeker:
    model: "gpt-4o-mini"
    # model: "Qwen3-8B"
    # base_url: "http://localhost:8000/v1"
    timeout: 60.0

  oracle:
    model: "gpt-4o-mini"
    timeout: 30.0

  pruner:
    model: "gpt-4o-mini"
    timeout: 30.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "objects"
  csv_path: "data/objects/objects_full.csv"  # or objects_test.csv for quick runs
  num_targets: null   # null = all objects
  runs_per_target: 1

experiment:
  name: "objects_full"
  max_workers: 8

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
