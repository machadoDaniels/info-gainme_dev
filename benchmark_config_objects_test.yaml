# Benchmark Configuration - Objects (quick test, 34 objects)
# Run: python benchmark_runner.py --config benchmark_config_objects_test.yaml

models:
  seeker:
    model: "gpt-4o-mini"
    timeout: 60.0

  oracle:
    model: "gpt-4o-mini"
    timeout: 30.0

  pruner:
    model: "gpt-4o-mini"
    timeout: 30.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "objects"
  csv_path: "data/objects/objects_test.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "objects_test"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
