# Benchmark Configuration - Diseases Test (40 diseases, quick runs)
# Run: python benchmark_runner.py --config benchmark_config_diseases_test.yaml

models:
  seeker:
    model: "gpt-4o-mini"
    timeout: 60.0

  oracle:
    model: "gpt-4o-mini"
    timeout: 30.0

  pruner:
    model: "gpt-4o-mini"
    timeout: 30.0

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_test.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_test_po"
  max_workers: 8

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
