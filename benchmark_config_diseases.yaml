# Benchmark Configuration - Diseases Dataset (773 diseases)
# Run: python benchmark_runner.py --config benchmark_config_diseases.yaml
# Preprocess first: python scripts/prepare_diseases_csv.py

models:
  seeker:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 60.0
    max_tokens: 4096

  oracle:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 60.0
    max_tokens: 4096

  pruner:
    model: "Qwen3-8B"
    base_url: "http://10.100.0.121:8020/v1"
    timeout: 60.0
    max_tokens: 4096

game:
  observability_mode: "PARTIALLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_full_po"
  max_workers: 8

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
