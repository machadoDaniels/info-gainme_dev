# Benchmark Configuration - Diseases Dataset (773 diseases)
# Run: python benchmark_runner.py --config benchmark_config_diseases.yaml
# Preprocess first: python scripts/prepare_diseases_csv.py

models:
  seeker:
    model: "gpt-4o-mini"
    timeout: 60.0

  oracle:
    model: "gpt-4o-mini"
    timeout: 30.0

  pruner:
    model: "gpt-4o-mini"
    timeout: 30.0

game:
  observability_mode: "FULLY_OBSERVABLE"
  max_turns: 25

dataset:
  type: "diseases"
  csv_path: "data/diseases/diseases_full.csv"
  num_targets: null
  runs_per_target: 1

experiment:
  name: "diseases_full"

output:
  base_dir: "outputs"
  save_conversations: true
  save_graph_plots: false

debug:
  enabled: true
